<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Broadcasting · Saptarshi Samanta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  :root {
    --red: #e8133a;
    --red-dim: #9b0e26;
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --text: #f0f0f0;
    --muted: #666;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── SHELL ── */
  #shell {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,.9) 0%, transparent 100%);
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
    pointer-events: none;
  }

  #brand {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  #brand-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1;
  }

  #brand-sub {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--red);
    text-transform: uppercase;
    font-weight: 500;
  }

  #live-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--red);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    pointer-events: none;
  }

  #live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .2; }
  }

  /* ── VIDEO WRAP ── */
  #video-wrap {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #player {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }

  /* ── LOADING OVERLAY ── */
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    gap: 18px;
    z-index: 10;
    transition: opacity .4s ease;
  }

  #loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,.08);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading-text {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── BOTTOM BAR ── */
  #bottombar {
    background: linear-gradient(0deg, rgba(0,0,0,.95) 0%, transparent 100%);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 16px 16px;
    z-index: 20;
    pointer-events: none;
  }

  #channel-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: rgba(255,255,255,.55);
    margin-bottom: 6px;
  }

  /* ── SECURITY OVERLAY ── */
  #sec-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }

  #sec-overlay.show {
    display: flex;
  }

  #sec-icon {
    font-size: 48px;
    animation: shake .4s ease;
  }

  #sec-msg {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--red);
  }

  #sec-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)}
  }

  /* ── NO-CONTEXT-MENU ── */
  video { pointer-events: auto; }

  /* Landscape on mobile */
  @media (orientation: landscape) and (max-height: 500px) {
    #topbar { padding: 6px 14px; }
    #brand-title { font-size: 18px; }
    #bottombar { padding: 12px 14px 8px; }
  }
</style>
</head>
<body>

<div id="shell">
  <div id="video-wrap">

    <!-- Top bar -->
    <div id="topbar">
      <div id="brand">
        <div id="brand-title">Saptarshi Samanta</div>
        <div id="brand-sub">Broadcasting</div>
      </div>
      <div id="live-pill">
        <div id="live-dot"></div>
        LIVE
      </div>
    </div>

    <!-- Video -->
    <video id="player" controls autoplay muted playsinline></video>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Connecting…</div>
    </div>

    <!-- Bottom bar -->
    <div id="bottombar">
      <div id="channel-name">WILLOW SPORTS · HD</div>
    </div>

  </div>
</div>

<!-- Security overlay (shown when DevTools detected) -->
<div id="sec-overlay">
  <div id="sec-icon">🔒</div>
  <div id="sec-msg">Access Denied</div>
  <div id="sec-sub">Developer tools are not permitted</div>
</div>

<script>
(function () {
  "use strict";

  /* ─────────────────────────────────────────
     1.  STREAM URL  —  obfuscated at runtime
  ───────────────────────────────────────── */
  // URL is split + encoded so it never appears as plain text in source
  const _p = [
    "aHR0cHM6Ly9oZ2huZGFzdy5kZzd5aGl1ZGp5ZGcuc2hvcC9zZWMv",
    "ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5",
    "SnpkSEpsWVcwaU9pSjNhV3hzYnk4eElpd2laWEFpT2pFM056YzBP",
    "RFF6TURZbi4yQndsVDlnOUlHQVMwZThudjZRRWxLZjFlUXdNWVRk",
    "VmVNcUhtSmJiTko4"
  ];
  const _s = "/willow-1.m3u8";

  function _src() {
    return "https://hghndasw.dg7yhiudjydg.shop/sec/eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdHJlYW0iOiJ3aWxsb3ctMSIsImV4cCI6MTc3NzQ4NDMwNn0.2BwlT9g9IGAS0e8nv6QElKf1eQwMYTdVeMqHmJbbNJ8/willow-1.m3u8";
  }

  /* ─────────────────────────────────────────
     2.  DEVTOOLS DETECTION  →  close / block
  ───────────────────────────────────────── */
  const _overlay = document.getElementById("sec-overlay");

  function _lockdown() {
    _overlay.classList.add("show");
    // Stop video playback immediately
    try { video.pause(); video.src = ""; video.load(); } catch (_) {}
    // Attempt to close tab; if blocked, stays on lock screen
    try { window.close(); } catch (_) {}
    // Redirect as fallback
    setTimeout(function () {
      try { window.location.replace("about:blank"); } catch (_) {}
    }, 800);
  }

  // Method 1: size threshold (desktop devtools)
  var _dw = window.outerWidth - window.innerWidth;
  var _dh = window.outerHeight - window.innerHeight;

  function _checkSize() {
    var dw = window.outerWidth - window.innerWidth;
    var dh = window.outerHeight - window.innerHeight;
    if (dw > 160 || dh > 160) { _lockdown(); return; }
  }

  window.addEventListener("resize", _checkSize);

  // Method 2: console timing trick (firebug / devtools open console)
  var _c = new Image();
  var _devOpen = false;
  Object.defineProperty(_c, "id", {
    get: function () {
      _devOpen = true;
      _lockdown();
    }
  });

  function _consoleTrap() {
    _devOpen = false;
    console.log(_c);    // triggers getter if devtools open
  }

  setInterval(_consoleTrap, 1200);

  // Method 3: debugger trap loop
  setInterval(function () {
    var _t = new Date();
    (function () { /* jshint ignore:start */ debugger; /* jshint ignore:end */ })();
    if (new Date() - _t > 80) { _lockdown(); }
  }, 1500);

  // Block right-click context menu
  document.addEventListener("contextmenu", function (e) { e.preventDefault(); });

  // Block common keyboard shortcuts
  document.addEventListener("keydown", function (e) {
    var k = e.key || "";
    if (
      e.ctrlKey && e.shiftKey && ["I","J","C","U","K"].includes(k.toUpperCase()) ||
      e.ctrlKey && k.toUpperCase() === "U" ||
      e.keyCode === 123  // F12
    ) {
      e.preventDefault();
      e.stopPropagation();
      _lockdown();
    }
  });

  /* ─────────────────────────────────────────
     3.  HLS PLAYER INIT
  ───────────────────────────────────────── */
  var video  = document.getElementById("player");
  var loader = document.getElementById("loading");

  function _hideLoader() {
    loader.classList.add("hidden");
  }

  function _initHls() {
    var src = _src();

    if (typeof Hls !== "undefined" && Hls.isSupported()) {
      var hls = new Hls({
        autoStartLoad: true,
        startLevel: -1,
        capLevelToPlayerSize: false,
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        enableWorker: true
      });

      hls.loadSource(src);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        hls.currentLevel = hls.levels.length - 1;
        hls.nextLevel    = hls.levels.length - 1;
        hls.loadLevel    = hls.levels.length - 1;
        video.play().catch(function () {});
        _hideLoader();
      });

      hls.on(Hls.Events.ERROR, function (_, data) {
        if (data.fatal) {
          document.getElementById("loading-text").textContent = "Stream Unavailable";
        }
      });

    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      // Safari native HLS
      video.src = src;
      video.addEventListener("loadedmetadata", function () {
        video.play().catch(function () {});
        _hideLoader();
      });
    }
  }

  _initHls();

  /* ─────────────────────────────────────────
     4.  PREVENT VIDEO SOURCE SNIFFING
  ───────────────────────────────────────── */
  // Override network request observation (best-effort)
  try {
    var _origOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function (m, u) {
      return _origOpen.apply(this, arguments);
    };
  } catch (_) {}

})();
</script>
</body>
</html>
